server {
    listen 80;

    # Serve compiled React SPA
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — unknown routes go to index.html, React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stream video files directly from disk
    # nginx handles range requests (seeking) automatically for static files
    # The browser's <video> tag sends "Range: bytes=X-Y" headers; nginx slices the file
    location /videos/ {
        alias /videos/;
        add_header Accept-Ranges bytes;
        # Allow the browser to play videos cross-origin if needed
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy REST API to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket upgrade — needs extra headers so nginx keeps the connection open
    location /api/v2/download {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Grafana — served under /grafana/ (GF_SERVER_SERVE_FROM_SUB_PATH=true handles asset links)
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Prometheus — served under /prometheus/ (--web.route-prefix sets the internal prefix)
    location /prometheus/ {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
