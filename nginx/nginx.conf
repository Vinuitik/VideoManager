server {
    listen 80;

    # Serve compiled React SPA
    root /usr/share/nginx/html;
    index index.html;

    # All unknown routes go to index.html (React router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket connections — needs extra headers
    location /api/v2/download {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;  # allow long-running downloads
    }
}
