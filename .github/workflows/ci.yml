name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:

  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install ffmpeg so tests that touch subprocess don't fail on missing binary
      - name: Install system deps
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run pytest
        run: pytest backend/tests/ -v
        # Run from repo root so "from main import app" resolves correctly
        env:
          PYTHONPATH: backend

  frontend-tests:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install deps
        run: npm install
        working-directory: frontend

      - name: Run vitest
        run: npm run test:run
        working-directory: frontend

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build
        # Verifies Dockerfile syntax, npm build, and pip install all succeed
